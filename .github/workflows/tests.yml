name: Automation Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

  workflow_dispatch:
    inputs:
      test_suite:
        description: "Choose test suite"
        required: true
        type: choice
        options:
          - api
          - ui


jobs:
  smoke-tests:
      if: github.event_name != 'workflow_dispatch'
      runs-on: ubuntu-latest

      steps:
        - name: Checkout code
          uses: actions/checkout@v4

        - name: Setup Java 17
          uses: actions/setup-java@v4
          with:
            distribution: temurin
            java-version: 17

        - name: Grant execute permission for gradlew
          run: chmod +x gradlew

        - name: Run Smoke tests
          run: ./gradlew clean smokeTest

  api-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run API tests
        run: ./gradlew clean apiTest

  ui-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Start Selenium
        run: docker run -d -p 4444:4444 --name selenium selenium/standalone-chrome:latest

      - name: Wait Selenium
        run: sleep 5

      - name: Run UI tests
        env:
         RUN_MODE: remote
         SELENIUM_URL: http://localhost:4444/wd/hub
        run: ./gradlew clean uiTest

      - name: Stop Selenium
        if: always()
        run: docker stop selenium && docker rm selenium